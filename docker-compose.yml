services:
  postgres:
    image: postgres:13
    networks: [brewery-net]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow -h localhost && psql -U airflow -d airflow -h localhost -c 'select 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  airflow-init:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command: |
      set -e
      airflow db migrate
      airflow users create \
        --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
        --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
        --firstname "$${_AIRFLOW_WWW_USER_FIRSTNAME}" \
        --lastname "$${_AIRFLOW_WWW_USER_LASTNAME}" \
        --role "$${_AIRFLOW_WWW_USER_ROLE}" \
        --email "$${_AIRFLOW_WWW_USER_EMAIL}" \
      || true
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-airflow}
      _AIRFLOW_WWW_USER_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME:-Airflow}
      _AIRFLOW_WWW_USER_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME:-Admin}
      _AIRFLOW_WWW_USER_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-airflow@example.com}
      _AIRFLOW_WWW_USER_ROLE: ${AIRFLOW_ADMIN_ROLE:-Admin}
      PYTHONPATH: /opt/airflow/src
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data_lake:/data_lake
      - ./logs:/opt/airflow/logs
    networks: [brewery-net]
    restart: "no"

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
      spark-worker:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__WORKERS: "1"
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "300"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-change-me-to-a-long-static-secret-key}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      S3_BUCKET: datalake
      BRONZE_PREFIX: bronze/breweries
      SILVER_PREFIX: silver/breweries
      GOLD_PREFIX: gold/breweries
      QUALITY_PREFIX: ${QUALITY_PREFIX:-monitoring/data_quality}
      SPARK_MASTER: spark://spark-master:7077
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      SMTP_SSL: ${SMTP_SSL:-false}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      ALERT_EMAIL_ON_SUCCESS: ${ALERT_EMAIL_ON_SUCCESS:-false}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data_lake:/data_lake
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    networks: [brewery-net]

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
      spark-worker:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-change-me-to-a-long-static-secret-key}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      S3_BUCKET: datalake
      BRONZE_PREFIX: bronze/breweries
      SILVER_PREFIX: silver/breweries
      GOLD_PREFIX: gold/breweries
      QUALITY_PREFIX: ${QUALITY_PREFIX:-monitoring/data_quality}
      SPARK_MASTER: spark://spark-master:7077
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      SMTP_SSL: ${SMTP_SSL:-false}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      ALERT_EMAIL_ON_SUCCESS: ${ALERT_EMAIL_ON_SUCCESS:-false}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data_lake:/data_lake
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/opt/airflow/logs
    command: scheduler
    networks: [brewery-net]

  spark-master:
    hostname: spark-master
    image: apache/spark:3.5.1
    user: "0:0"
    networks: [brewery-net]
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 5s
      timeout: 3s
      retries: 30
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./data_lake:/data_lake
    

  spark-worker:
    image: apache/spark:3.5.1
    user: "0:0"
    networks: [brewery-net]
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    ports:
      - "8082:8081"
    volumes:
      - ./data_lake:/data_lake

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks: [brewery-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    networks: [brewery-net]
    entrypoint: >
      /bin/sh -lc "
      set -e
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}
      mc mb -p local/datalake || true
      mc anonymous set download local/datalake || true
      echo 'MinIO bucket datalake is ready.'"
    restart: "no"

  tests:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    working_dir: /opt/airflow
    environment:
      PYTHONPATH: /opt/airflow/src
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./tests:/opt/airflow/tests
      - ./pytest.ini:/opt/airflow/pytest.ini
    command: bash -lc "python -m pytest -q"
    networks: [brewery-net] 

networks:
  brewery-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
